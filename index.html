<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apps Com</title>
  <meta property="og:title" content="Apps Com">
  <meta property="og:type" content="website">
  <style>
    :root {
      --bg: #0c0c14;
      --panel: rgba(20, 20, 30, 0.85);
      --panel-border: rgba(255, 255, 255, 0.08);
      --accent: #ffd23a;
      --text: #e9eaee;
      --muted: #8a8d99;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, #1a1530 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, #0f1830 0%, transparent 50%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 48px 32px;
      text-align: center;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 0 0 48px;
      text-shadow: 0 2px 16px rgba(255, 210, 58, 0.2);
    }

    .apps {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    .apps a {
      display: block;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      text-align: left;
      backdrop-filter: blur(6px);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.2s ease;
    }

    .apps a:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 210, 58, 0.4);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .apps h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--accent);
    }

    .apps p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 36px; letter-spacing: 1px; }
      main { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Apps Com</h1>

    <ul class="apps">
      <li>
        <a href="rivals-randomizer/index.html">
          <h2>Rivals Loadout Randomizer</h2>
          <p>Random weapon picker for the Roblox game Rivals.</p>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
